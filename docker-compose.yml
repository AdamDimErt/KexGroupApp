version: '3.8'

services:
  # ═══════════════════════════════════════════════════
  # DATABASE
  # ═══════════════════════════════════════════════════

  postgres:
    image: postgres:15-alpine
    container_name: dashboard-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: dashboard
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: dashboard-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ═══════════════════════════════════════════════════
  # BACKEND SERVICES
  # ═══════════════════════════════════════════════════
  # В dev: запускаются через `turbo dev`
  # В prod: docker compose --profile prod up

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: dashboard-auth
    profiles: ["prod"]
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: dashboard-gateway
    profiles: ["prod"]
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: always

  finance-service:
    build:
      context: .
      dockerfile: apps/finance-service/Dockerfile
    container_name: dashboard-finance
    profiles: ["prod"]
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  aggregator-worker:
    build:
      context: .
      dockerfile: apps/aggregator-worker/Dockerfile
    container_name: dashboard-aggregator
    profiles: ["prod"]
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # ═══════════════════════════════════════════════════
  # REVERSE PROXY (production only)
  # ═══════════════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: dashboard-nginx
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    restart: always

volumes:
  postgres_data:
  redis_data:
